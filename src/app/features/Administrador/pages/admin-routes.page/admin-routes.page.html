<div class="container-fluid p-4 bg-light min-vh-100">
  <!-- Header -->
  <div class="mb-4">
    <h2 class="fw-bold mb-1">Gestión de Rutas</h2>
    <p class="text-muted small">Administre destinos, precios y estados operativos.</p>
  </div>

  <!-- Stats Grid -->
  <div class="row g-3 mb-4">
    <div class="col-md-4"
      *ngFor="let stat of [{l:'Total', v:'24', c:'text-dark'}, {l:'Activas', v:'22', c:'text-success'}, {l:'Demanda', v:'6', c:'text-primary'}]">
      <div class="bg-white p-3 rounded-4 shadow-sm border-0">
        <small class="text-muted fw-bold d-block mb-1">{{stat.l}}</small>
        <h3 [class]="'fw-bold mb-0 ' + stat.c">{{stat.v}}</h3>
      </div>
    </div>
  </div>

  <!-- Control Bar & Table -->
  <div class="bg-white rounded-4 shadow-sm border-0 p-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="position-relative" style="width: 300px;">
        <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
        <input type="text" class="form-control form-control-sm rounded-pill ps-5 bg-light border-0"
          placeholder="Buscar ruta...">
      </div>
      <button class="btn btn-sm btn-success rounded-pill px-4 fw-bold" (click)="isModalOpen = true">
        <i class="bi bi-plus-lg me-1"></i> Nueva Ruta
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="bg-light text-muted small">
          <tr>
            <th class="border-0 px-3">ORIGEN</th>
            <th class="border-0">DESTINO</th>
            <th class="border-0 text-center">TIEMPO (H)</th>
            <th class="border-0 text-center">PRECIO</th>
            <th class="border-0">ESTADO</th>
            <th class="border-0 text-end px-3">ACCIONES</th>
          </tr>
        </thead>
        <tbody class="small fw-semibold">
          <tr *ngFor="let r of [
            {o:'Huánuco', d:'Tingo María', t:'2.5', p:'35.00', s:'Activa'},
            {o:'Lima', d:'Huánuco', t:'9.0', p:'80.00', s:'Inactiva'}
          ]">
            <td class="px-3 text-dark">{{r.o}}</td>
            <td class="text-dark">{{r.d}}</td>
            <td class="text-center">{{r.t}}</td>
            <td class="text-center text-primary">S/ {{r.p}}</td>
            <td>
              <span
                [class]="'badge rounded-pill ' + (r.s === 'Activa' ? 'bg-success-subtle text-success' : 'bg-secondary-subtle text-secondary')">
                {{r.s}}
              </span>
            </td>
            <td class="text-end px-3">
              <button class="btn btn-sm btn-light border rounded-circle me-1" (click)="openEdit({origin: r.o})">
                <i class="bi bi-pencil text-primary"></i>
              </button>
              <button class="btn btn-sm btn-light border rounded-circle" (click)="isDeleteModalOpen = true">
                <i class="bi bi-trash text-danger"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Modals -->
  <app-register-new-route *ngIf="isModalOpen" [isOpen]="isModalOpen"
    (close)="isModalOpen = false"></app-register-new-route>
  <app-edit-route *ngIf="isEditModalOpen" [isOpen]="isEditModalOpen" [routeToEdit]="selectedRoute"
    (close)="isEditModalOpen = false"></app-edit-route>
  <app-delete-route *ngIf="isDeleteModalOpen" [isOpen]="isDeleteModalOpen"
    (close)="isDeleteModalOpen = false"></app-delete-route>
</div>
