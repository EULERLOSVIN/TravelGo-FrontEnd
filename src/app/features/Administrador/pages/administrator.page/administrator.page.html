<!-- ==================================================
     ADMINISTRADOR / PERFIL PRINCIPAL
================================================== -->
<section class="admin-profile">

  <!-- ===============================
       HEADER CARD
  ================================ -->
  <section class="profile-header card">

    <div class="profile-info">
      <div class="avatar-box">
        <img src="img/van1.png" alt="Admin Avatar" />
        <button class="edit-avatar">
          <i class="bi bi-camera"></i>
        </button>
      </div>

      <div>
        <h2>
          Darwin Chamaya
          <span class="status active">ACTIVO</span>
        </h2>
        <p>Administrador General · ID: 4589201</p>
      </div>
    </div>

    <div class="header-actions" *ngIf="editMode">
      <button class="btn-save" (click)="saveChanges()">
        Guardar Cambios
      </button>
      <button class="btn-cancel" (click)="cancelEdit()">
        Cancelar
      </button>
    </div>

  </section>

  <!-- ===============================
       DATOS PERSONALES
  ================================ -->
  <section class="card">

    <div class="card-header">
      <h3>Datos Personales</h3>
      <small>Información básica de la cuenta</small>

      <button class="edit-btn" (click)="toggleEdit()">
        <i class="bi bi-pencil"></i>
      </button>
    </div>

    <div class="form-grid">

      <div class="form-group">
        <label>Nombre Completo</label>
        <input
          type="text"
          [disabled]="!editMode"
          [(ngModel)]="admin.name" />
      </div>

      <div class="form-group">
        <label>Correo Electrónico</label>
        <div class="input-lock">
          <input
            type="email"
            [disabled]="true"
            [(ngModel)]="admin.email" />
          <i class="bi bi-lock"></i>
        </div>
      </div>

      <div class="form-group">
        <label>Teléfono</label>
        <input
          type="text"
          [disabled]="!editMode"
          [(ngModel)]="admin.phone" />
      </div>

      <div class="form-group">
        <label>DNI / NIE</label>
        <input
          type="text"
          [disabled]="true"
          [(ngModel)]="admin.dni" />
      </div>

    </div>

  </section>

  <!-- ===============================
       SEGURIDAD
  ================================ -->
  <section class="card">

    <div class="card-header">
      <h3>Seguridad de la Cuenta</h3>
      <small>Gestión de accesos y contraseñas</small>
    </div>

    <div class="form-grid">

      <div class="form-group">
        <label>Contraseña Actual</label>
        <input type="password" placeholder="••••••••" />
      </div>

      <div class="form-group">
        <label>Nueva Contraseña</label>
        <input type="password" placeholder="Mínimo 8 caracteres" />
      </div>

      <div class="form-group">
        <label>Confirmar Contraseña</label>
        <input type="password" placeholder="Repetir contraseña" />
      </div>

    </div>

  </section>

</section>
