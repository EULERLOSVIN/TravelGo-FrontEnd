<div class="dashboard-container">
  <!-- Header / Greeting -->
  <header class="dashboard-header">
    <div class="greeting-info">
      <h1>¡Bienvenido, {{ adminName }}!</h1>
      <p><i class="bi bi-calendar3"></i> {{ formatDate(currentTime) }} · <span>Sistema en línea</span></p>
    </div>
  </header>

  <!-- KPI Grid -->
  <section class="kpi-grid">
    <div class="kpi-card glass" *ngFor="let stat of stats">
      <div class="kpi-icon" [style.background-color]="stat.color + '20'" [style.color]="stat.color">
        <i class="bi" [ngClass]="stat.icon"></i>
      </div>
      <div class="kpi-data">
        <span class="label">{{ stat.label }}</span>
        <h3 class="value">{{ stat.value }}</h3>
        <span class="trend" [ngClass]="{'positive': stat.trend.includes('+'), 'negative': stat.trend.includes('-')}">
          {{ stat.trend }} vs ayer
        </span>
      </div>
    </div>
  </section>

  <!-- Main Grid Content -->
  <div class="dashboard-main-grid">
    <!-- Left Column: Recent Activity -->
    <section class="dashboard-card recent-activity glass">
      <div class="card-header">
        <h3><i class="bi bi-clock-history"></i> Actividad Reciente</h3>
        <button class="btn-primary-gradient" type="button">
          <i class="bi bi-eye"></i>
          Ver todo
        </button>
      </div>
      <div class="activity-timeline">
        <div class="activity-item" *ngFor="let act of recentActivity">
          <div class="activity-icon-wrapper">
            <i class="bi" [ngClass]="act.icon"></i>
          </div>
          <div class="activity-content">
            <strong>{{ act.title }}</strong>
            <span>{{ act.time }}</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Right Column: Quick Actions & Alerts -->
    <div class="dashboard-side-grid">
      <section class="dashboard-card quick-actions glass">
        <h3>Acciones Rápidas</h3>
        <div class="actions-grid">
          <button class="action-btn" *ngFor="let action of quickActions" [style.background-color]="action.color"
            [style.color]="action.textColor" (click)="handleAction(action.label)">
            <i class="bi" [ngClass]="action.icon"></i>
            {{ action.label }}
          </button>
        </div>
      </section>

      <section class="dashboard-card system-status glass">
        <div class="status-header">
          <h3>Estado del Sistema</h3>
          <span class="dot pulse"></span>
        </div>
        <div class="status-list">
          <div class="status-item">
            <span>Base de Datos</span>
            <span class="badge success">OK</span>
          </div>
          <div class="status-item">
            <span>Servidor API</span>
            <span class="badge success">OK</span>
          </div>
          <div class="status-item">
            <span>Servicio de Tickets</span>
            <span class="badge warning">Lento</span>
          </div>
        </div>
      </section>
    </div>
  </div>
</div>

<!-- Modal para registrar nueva ruta -->
<app-register-new-route [isOpen]="isModalOpen" (close)="isModalOpen = false"></app-register-new-route>
