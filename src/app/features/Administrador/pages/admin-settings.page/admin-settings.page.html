<div class="container-fluid py-4 settings-container" style="max-width: 1000px; margin: 0 auto;">
  <!-- Header Title -->
  <header class="mb-4 d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center">
      <div class="p-2 rounded-3 me-3" style="background-color: rgba(22, 163, 74, 0.1); color: #16a34a;">
        <i class="bi bi-gear-fill fs-4"></i>
      </div>
      <div>
        <h1 class="h3 fw-bold text-dark mb-0">Ajustes Generales</h1>
        <p class="text-muted mb-0">Gestiona los parámetros globales de la aplicación</p>
      </div>
    </div>

    <div
      class="d-flex align-items-center badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 rounded-pill px-3 py-2 shadow-sm">
      <span class="spinner-grow spinner-grow-sm me-2" role="status" aria-hidden="true"
        style="width: 0.5rem; height: 0.5rem;"></span>
      <span class="fw-semibold">Sistema En Línea</span>
    </div>
  </header>

  <!-- Contenido Principal -->
  <main class="settings-content">

    <!-- Componente Hijo (Único) -->
    <div class="fade show">
      <app-settings-general></app-settings-general>
    </div>

  </main>
</div>
