<div class="container-fluid py-4 profile-container" style="max-width: 900px; margin: 0 auto;">
    <!-- Header Title -->
    <header class="mb-4 d-flex align-items-center">
        <div class="p-2 rounded-3 me-3" style="background-color: rgba(22, 163, 74, 0.1); color: #16a34a;">
            <i class="bi bi-person-badge fs-4"></i>
        </div>
        <div>
            <h1 class="h3 fw-bold text-dark mb-0">Mi Perfil</h1>
            <p class="text-muted mb-0">Gestiona tu información personal y credenciales de acceso</p>
        </div>
    </header>

    <!-- Profile Content -->
    <section class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <!-- Cover Background -->
        <div style="height: 120px; background: linear-gradient(135deg, #16a34a 0%, #0d7f38 100%);"></div>

        <div class="card-body px-4 px-md-5 pb-5 position-relative" *ngIf="!isLoading && adminProfile">
            <!-- Avatar Section -->
            <div class="d-flex flex-column flex-sm-row align-items-sm-end mb-5" style="margin-top: -60px;">
                <div class="position-relative me-sm-4 mb-3 mb-sm-0 text-center text-sm-start">
                    <img [src]="'https://ui-avatars.com/api/?name=' + adminProfile.firstName + '+' + adminProfile.lastName + '&background=fff&color=16a34a&size=120'"
                        alt="Avatar Perfil" class="rounded-circle border border-4 border-white shadow-sm bg-white"
                        width="120" height="120">
                </div>

                <div class="pb-sm-2 text-center text-sm-start">
                    <h2 class="h4 fw-bold mb-1">{{adminProfile.firstName}} {{adminProfile.lastName}}</h2>
                    <span
                        class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 rounded-pill px-3 py-1 fw-medium">
                        <i class="bi bi-shield-lock me-1"></i> Super Administrador
                    </span>
                </div>
            </div>

            <!-- Form Section -->
            <form class="row g-4" #profileForm="ngForm">
                <!-- Personal Info -->
                <div class="col-md-6 border-end pe-md-4">
                    <h3 class="h6 fw-bold text-uppercase text-muted mb-4 d-flex align-items-center">
                        <i class="bi bi-person me-2 fs-5" style="color: #16a34a;"></i>
                        Datos Personales
                    </h3>

                    <div class="row g-3">
                        <div class="col-sm-6">
                            <label class="form-label fw-semibold text-dark small">Nombres: <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control focus-brand" [(ngModel)]="adminProfile.firstName"
                                name="firstName" required (ngModelChange)="updateEmail()" #firstName="ngModel"
                                [ngClass]="{'is-invalid': firstName.invalid && (firstName.dirty || firstName.touched)}" />
                        </div>

                        <div class="col-sm-6">
                            <label class="form-label fw-semibold text-dark small">Apellidos: <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control focus-brand" [(ngModel)]="adminProfile.lastName"
                                name="lastName" required (ngModelChange)="updateEmail()" #lastName="ngModel"
                                [ngClass]="{'is-invalid': lastName.invalid && (lastName.dirty || lastName.touched)}" />
                        </div>

                        <div class="col-sm-6">
                            <label class="form-label fw-semibold text-dark small">Tipo de Documento:</label>
                            <input type="text" class="form-control focus-brand bg-light"
                                [value]="adminProfile.documentType" disabled />
                        </div>

                        <div class="col-sm-6">
                            <label class="form-label fw-semibold text-dark small">Número de Documento:</label>
                            <input type="text" class="form-control focus-brand bg-light"
                                [(ngModel)]="adminProfile.documentNumber" name="documentNumber" disabled />
                        </div>

                        <div class="col-sm-6">
                            <label class="form-label fw-semibold text-dark small">Celular: <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control focus-brand" [(ngModel)]="adminProfile.phoneNumber"
                                name="phoneNumber" required pattern="^[0-9]{9}$" #phoneNumber="ngModel"
                                [ngClass]="{'is-invalid': phoneNumber.invalid && (phoneNumber.dirty || phoneNumber.touched)}" />
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-semibold text-dark small">Correo Corporativo:</label>
                            <input type="email" class="form-control focus-brand bg-light"
                                [(ngModel)]="adminProfile.email" name="email" disabled />
                        </div>
                    </div>
                </div>

                <!-- Security & Access -->
                <div class="col-md-6 ps-md-4">
                    <h3 class="h6 fw-bold text-uppercase text-muted mb-4 d-flex align-items-center">
                        <i class="bi bi-shield-lock me-2 fs-5" style="color: #dc2626;"></i>
                        Acceso al Sistema
                    </h3>

                    <div class="row g-3">
                        <div class="col-12 mt-2">
                            <label class="form-label fw-semibold text-dark small">Nueva Contraseña:</label>
                            <input type="password" class="form-control focus-brand" placeholder="••••••••"
                                [(ngModel)]="adminProfile.newPassword" name="newPassword" />
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-semibold text-dark small">Confirmar Contraseña:</label>
                            <input type="password" class="form-control focus-brand" placeholder="••••••••"
                                [(ngModel)]="confirmPassword" name="confirmPassword" />
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="col-12 mt-5 text-end border-top pt-4">
                    <button type="button" class="btn btn-outline-secondary px-4 py-2 me-2 fw-medium rounded-pill">
                        Cancelar
                    </button>
                    <button type="button" (click)="saveChanges()"
                        class="btn text-white px-4 py-2 fw-semibold shadow-sm rounded-pill d-inline-flex align-items-center"
                        style="background-color: #16a34a; border-color: #16a34a;"
                        [disabled]="isSaving || profileForm.invalid">
                        <i class="bi bi-check-lg me-2"></i> {{ isSaving ? 'Guardando...' : 'Guardar Cambios' }}
                    </button>
                </div>
            </form>
        </div>

        <!-- Spinner de Carga -->
        <div class="card-body px-4 px-md-5 py-5 text-center" *ngIf="isLoading">
            <div class="spinner-border text-success" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
            <p class="mt-3 text-muted">Cargando perfil...</p>
        </div>

        <!-- Mensaje de Error -->
        <div class="card-body px-4 px-md-5 py-5 text-center" *ngIf="!isLoading && errorMessage">
            <div class="text-danger mb-3">
                <i class="bi bi-exclamation-triangle fs-1"></i>
            </div>
            <h4 class="h5 text-dark">Error al cargar</h4>
            <p class="text-muted">{{ errorMessage }}</p>
        </div>
    </section>
</div>

<!-- Toast Notification -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;">
    <div class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true"
        [class.show]="showSuccessToast" [style.display]="showSuccessToast ? 'block' : 'none'">
        <div class="d-flex">
            <div class="toast-body fw-medium">
                <i class="bi bi-check-circle-fill me-2"></i> Perfil actualizado correctamente.
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="showSuccessToast = false"
                aria-label="Close"></button>
        </div>
    </div>
</div>

<style>
    /* Estilo para que los inputs no se pongan azules al hacer focus, sino del color de la marca */
    .focus-brand:focus {
        border-color: #16a34a;
        box-shadow: 0 0 0 0.25rem rgba(22, 163, 74, 0.25);
    }
</style>
