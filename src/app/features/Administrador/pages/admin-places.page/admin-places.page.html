<div class="container-fluid py-4">

  <!-- HEADER -->
  <div class="row align-items-center mb-4">
    <div class="col-12 col-md-8">
      <h1 class="display-6 fw-bold text-dark mb-1" style="letter-spacing: -1px;">Gestión de Lugares</h1>
      <p class="text-secondary small text-uppercase fw-semibold mb-0" style="letter-spacing: 1px;">
        Administre las sedes y ubicaciones disponibles
      </p>
    </div>

    <div class="col-12 col-md-4 mt-3 mt-md-0">
      <div class="d-flex align-items-center justify-content-md-end gap-3">
        <button
          class="btn btn-success text-white px-4 py-2 rounded-pill shadow-sm fw-bold d-flex align-items-center gap-2"
          (click)="openNew()">
          <i class="bi bi-plus-lg"></i>
          Nuevo Lugar
        </button>
      </div>
    </div>
  </div>

  <!-- BUSCADOR -->
  <div class="row align-items-center mb-4 g-3">
    <div class="col-12 col-md-6">
      <div class="input-group">
        <span class="input-group-text bg-white border-end-0 rounded-start-pill ps-3">
          <i class="bi bi-search text-muted"></i>
        </span>
        <input type="text" class="form-control border-start-0 rounded-end-pill ps-0 shadow-sm"
          placeholder="Buscar lugar..." [(ngModel)]="searchTerm" (input)="applyFilters()">
      </div>
    </div>
  </div>

  <!-- TABLA -->
  <div class="card border-0 shadow-sm overflow-hidden rounded-4">
    <div class="table-responsive">
      <table class="table align-middle mb-0 table-hover">
        <thead class="table-dark">
          <tr>
            <th class="ps-4 py-3 fw-bold border-0 rounded-start-2">Nombre</th>
            <th class="py-3 fw-bold border-0">Descripción</th>
            <th class="text-end pe-4 py-3 fw-bold border-0 rounded-end-2">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let s of paginatedPlaces">
            <td class="ps-4 text-dark fw-bold">{{s.name}}</td>
            <td class="text-muted small">{{s.description}}</td>
            <td class="text-end pe-4">
              <div class="d-flex justify-content-end gap-2">
                <button
                  class="btn btn-white btn-sm rounded-circle shadow-sm d-flex align-items-center justify-content-center text-primary"
                  style="width: 32px; height: 32px;" title="Editar" (click)="openEdit(s)">
                  <i class="bi bi-pencil-fill" style="font-size: 0.8rem;"></i>
                </button>
                <button
                  class="btn btn-white btn-sm rounded-circle shadow-sm d-flex align-items-center justify-content-center text-danger"
                  style="width: 32px; height: 32px;" title="Eliminar" (click)="openDelete(s)">
                  <i class="bi bi-trash3-fill" style="font-size: 0.8rem;"></i>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="paginatedPlaces.length === 0">
            <td colspan="3" class="text-center py-5 text-muted">
              <div class="d-flex flex-column align-items-center">
                <i class="bi bi-inbox fs-1 mb-2 opacity-50"></i>
                <span>No se encontraron lugares.</span>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- FOOTER (Paginación) -->
    <div class="d-flex justify-content-between align-items-center p-3 bg-white border-top">
      <small class="text-muted fw-medium">
        Mostrando {{ (currentPage - 1) * pageSize + 1 }} - {{ Math.min(currentPage * pageSize, places.length) }}
        de {{ places.length }} registros
      </small>

      <nav aria-label="Page navigation">
        <ul class="pagination pagination-sm mb-0 gap-1">
          <li class="page-item" [class.disabled]="currentPage === 1">
            <button class="page-link border-0 rounded-circle d-flex align-items-center justify-content-center"
              (click)="changePage(currentPage - 1)" style="width: 32px; height: 32px;" [disabled]="currentPage === 1">
              <i class="bi bi-chevron-left small"></i>
            </button>
          </li>

          <li class="page-item" *ngFor="let page of getPages()" [class.active]="page === currentPage">
            <button
              class="page-link border-0 rounded-circle d-flex align-items-center justify-content-center shadow-sm fw-bold"
              (click)="changePage(page)" [class.bg-dark]="page === currentPage"
              [class.text-white]="page === currentPage" [class.text-secondary]="page !== currentPage"
              style="width: 32px; height: 32px;">
              {{ page }}
            </button>
          </li>

          <li class="page-item" [class.disabled]="currentPage === totalPages">
            <button class="page-link border-0 rounded-circle d-flex align-items-center justify-content-center"
              (click)="changePage(currentPage + 1)" style="width: 32px; height: 32px;"
              [disabled]="currentPage === totalPages">
              <i class="bi bi-chevron-right small"></i>
            </button>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</div>

<!-- Modals -->
<app-new-places [isOpen]="isNewModalOpen" (close)="isNewModalOpen = false"></app-new-places>
<app-edit-places [isOpen]="isEditModalOpen" [placeToEdit]="selectedPlace"
  (close)="isEditModalOpen = false"></app-edit-places>
<app-delete-places [isOpen]="isDeleteModalOpen" [place]="selectedPlace"
  (close)="isDeleteModalOpen = false"></app-delete-places>
