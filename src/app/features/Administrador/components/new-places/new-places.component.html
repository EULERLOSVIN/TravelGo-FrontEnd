<div class="modal d-block bg-dark bg-opacity-50" *ngIf="isOpen" (click)="close.emit()" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered" (click)="$event.stopPropagation()">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Nuevo Lugar</h5>
                <button type="button" class="btn-close" (click)="close.emit()"></button>
            </div>
            <div class="modal-body py-3">
                <form #form="ngForm">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold mb-1">Nombre <span
                                class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-sm rounded-pill" [(ngModel)]="place.name"
                            name="name" required maxlength="50" pattern=".*[a-zA-ZñÑáéíóúÁÉÍÓÚ].*" #nameInput="ngModel"
                            placeholder="Nombre del lugar">
                        <div *ngIf="nameInput.invalid && (nameInput.dirty || nameInput.touched)"
                            class="text-danger small mt-1">
                            <div *ngIf="nameInput.errors?.['required']">El nombre es obligatorio.</div>
                            <div *ngIf="nameInput.errors?.['pattern']">El nombre debe contener al menos una letra.</div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold mb-1">Descripción</label>
                        <textarea class="form-control form-control-sm rounded-3" [(ngModel)]="place.description"
                            name="description" rows="3" placeholder="Descripción del lugar"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-sm btn-light rounded-pill px-3" (click)="close.emit()"
                    [disabled]="isLoading">Cancelar</button>
                <button type="button" class="btn btn-sm btn-success rounded-pill px-3" (click)="save()"
                    [disabled]="isLoading || nameInput.invalid">
                    {{ isLoading ? 'Guardando...' : 'Guardar' }}
                </button>
            </div>
        </div>
    </div>
</div>
