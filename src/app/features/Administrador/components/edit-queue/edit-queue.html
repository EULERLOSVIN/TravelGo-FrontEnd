<div class="modal fade" id="editRouteModal" tabindex="-1" aria-labelledby="editRouteModalLabel" aria-hidden="true"
    *ngIf="itemToEdit">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="modal-header bg-primary text-white border-0 py-3">
                <h5 class="modal-title fw-bold d-flex align-items-center gap-2" id="editRouteModalLabel">
                    <i class="bi bi-pencil-square"></i> Reasignar Ruta
                </h5>
                <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 bg-light">
                <div class="alert alert-secondary border-0 d-flex align-items-center gap-3 mb-4">
                    <div class="bg-white rounded-circle p-2 shadow-sm d-flex align-items-center justify-content-center"
                        style="width:40px;height:40px;">
                        <i class="bi bi-person-fill text-muted fs-5"></i>
                    </div>
                    <div>
                        <h6 class="mb-0 fw-bold">{{ itemToEdit.driverFullName }}</h6>
                        <small class="text-muted"><i class="bi bi-car-front"></i> {{ itemToEdit.vehiclePlate ||
                            'N/A' }}</small>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold text-dark small">Movilizar hacia:</label>
                    <select class="form-select shadow-none border-primary border-opacity-25" [(ngModel)]="routeId">
                        <option *ngFor="let route of routes" [ngValue]="route.idRoute">
                            {{ route.destinationName }}
                        </option>
                    </select>
                    <div class="form-text mt-2"><i class="bi bi-info-circle"></i> Seleccione una ruta distinta si el
                        vehículo cambió de destino.</div>
                </div>
            </div>
            <div class="modal-footer border-0 p-3 pt-0 bg-light d-flex gap-2">
                <button type="button" class="btn btn-light border fw-semibold flex-grow-1"
                    data-bs-dismiss="modal">Mantener Actual</button>
                <button type="button" class="btn btn-primary fw-bold flex-grow-1 shadow-sm" (click)="submit()"
                    data-bs-dismiss="modal">
                    <i class="bi bi-arrow-left-right me-1"></i> Guardar Cambios
                </button>
            </div>
        </div>
    </div>
</div>
