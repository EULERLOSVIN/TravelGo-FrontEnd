<div class="modal fade" [class.show]="isOpen" [style.display]="isOpen ? 'block' : 'none'" tabindex="-1"
    aria-hidden="true" (click)="onClose()">
    <div class="modal-dialog modal-dialog-centered modal-lg" (click)="$event.stopPropagation()">
        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">

            <!-- HEADER -->
            <div class="modal-header border-bottom p-4">
                <button type="button" class="btn-close shadow-none" (click)="onClose()"></button>
                <h5 class="modal-title fw-bold flex-grow-1 text-center">Registro de Nueva Sede</h5>
                <button class="btn btn-link text-success p-0">
                    <i class="bi bi-question-circle fs-5"></i>
                </button>
            </div>

            <!-- BODY -->
            <div class="modal-body p-4 custom-scrollbar">

                <!-- VISTA DE ÉXITO -->
                <div *ngIf="isSuccess" class="text-center py-5">
                    <div class="mb-4">
                        <div class="rounded-circle bg-success bg-opacity-10 d-inline-flex align-items-center justify-content-center"
                            style="width: 80px; height: 80px;">
                            <span class="text-success fs-1">✔️</span>
                        </div>
                    </div>
                    <h4 class="fw-bold text-dark mb-2">¡Sede Creada!</h4>
                    <p class="text-muted mb-4">La nueva sede se ha registrado correctamente en el sistema.</p>

                    <div class="d-grid gap-2 col-8 mx-auto">
                        <button class="btn btn-success fw-bold py-3 rounded-3 shadow-lg" (click)="finish()">
                            Aceptar y Cerrar
                        </button>
                    </div>
                </div>

                <!-- VISTA DEL FORMULARIO -->
                <div *ngIf="!isSuccess" [formGroup]="form">

                    <div class="row g-3">
                        <!-- Section: Información Principal -->
                        <div class="col-12">
                            <h6 class="fw-bold mb-0 text-primary"><i class="bi bi-info-circle me-1"></i> Información
                                General</h6>
                            <hr class="my-2 opacity-25">
                        </div>

                        <!-- Nombre -->
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Nombre <span class="text-danger">*</span></label>
                            <input type="text" class="form-control rounded-3" placeholder="Sede Central"
                                formControlName="Name"
                                [class.is-invalid]="form.get('Name')?.invalid && form.get('Name')?.touched">
                            <div *ngIf="form.get('Name')?.touched && form.get('Name')?.invalid"
                                class="invalid-feedback small">
                                <span *ngIf="form.get('Name')?.hasError('required')">Requerido.</span>
                                <span *ngIf="form.get('Name')?.hasError('isNumeric')">No solo números.</span>
                            </div>
                        </div>

                        <!-- Teléfono -->
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Teléfono <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 rounded-start-3"><i
                                        class="bi bi-telephone text-muted"></i></span>
                                <input type="tel" class="form-control border-start-0 rounded-end-3"
                                    placeholder="999 888 777" formControlName="Phone"
                                    [class.is-invalid]="form.get('Phone')?.invalid && form.get('Phone')?.touched">
                            </div>
                        </div>

                        <!-- Correo -->
                        <div class="col-12">
                            <label class="form-label small fw-bold">Correo Electrónico</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 rounded-start-3"><i
                                        class="bi bi-envelope text-muted"></i></span>
                                <input type="email" class="form-control border-start-0 rounded-end-3"
                                    placeholder="contacto@empresa.com" formControlName="Email"
                                    [class.is-invalid]="form.get('Email')?.invalid && form.get('Email')?.touched">
                            </div>
                        </div>

                        <!-- Dirección -->
                        <div class="col-12">
                            <label class="form-label small fw-bold">Dirección <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0 rounded-start-3"><i
                                        class="bi bi-geo-alt text-muted"></i></span>
                                <input type="text" class="form-control border-start-0 rounded-end-3"
                                    placeholder="Av. Principal 123" formControlName="Address"
                                    [class.is-invalid]="form.get('Address')?.invalid && form.get('Address')?.touched">
                            </div>
                        </div>

                        <!-- Section: Ubicación -->
                        <div class="col-12 mt-4">
                            <h6 class="fw-bold mb-0 text-primary"><i class="bi bi-map me-1"></i> Ubicación</h6>
                            <hr class="my-2 opacity-25">
                        </div>

                        <!-- Departamento, Provincia, Distrito (3 cols) -->
                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Departamento (Nuevo) <span
                                    class="text-danger">*</span></label>
                            <select class="form-select rounded-3" formControlName="Department"
                                (change)="onDepartmentChange($event)"
                                [class.is-invalid]="form.get('Department')?.invalid && form.get('Department')?.touched">
                                <option value="">Seleccione</option>
                                <option *ngFor="let d of departments" [value]="d.departamento">{{ d.departamento }}
                                </option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Provincia <span class="text-danger">*</span></label>
                            <select class="form-select rounded-3" formControlName="Province"
                                (change)="onProvinceChange($event)"
                                [class.is-invalid]="form.get('Province')?.invalid && form.get('Province')?.touched">
                                <option value="">Seleccione</option>
                                <option *ngFor="let p of provinces" [value]="p.provincia">{{ p.provincia }}</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label small fw-bold">Distrito <span class="text-danger">*</span></label>
                            <select class="form-select rounded-3" formControlName="District"
                                [class.is-invalid]="form.get('District')?.invalid && form.get('District')?.touched">
                                <option value="">Seleccione</option>
                                <option *ngFor="let d of districts" [value]="d.distrito">{{ d.distrito }}</option>
                            </select>
                        </div>

                        <!-- Section: Ajustes -->
                        <div class="col-12 mt-4">
                            <h6 class="fw-bold mb-0 text-primary"><i class="bi bi-sliders me-1"></i> Configuración</h6>
                            <hr class="my-2 opacity-25">
                        </div>

                        <!-- Principal Switch (Left) -->
                        <div class="col-12 col-md-6">
                            <div
                                class="p-3 border rounded-4 d-flex align-items-center justify-content-between bg-white h-100 shadow-sm">
                                <div class="d-flex align-items-center gap-3">
                                    <div class="rounded-circle bg-success bg-opacity-10 d-flex align-items-center justify-content-center"
                                        style="width: 45px; height: 45px;">
                                        <i class="bi bi-patch-check-fill text-success fs-4"></i>
                                    </div>
                                    <div>
                                        <h6 class="fw-bold mb-1 text-dark" style="font-size: 0.9rem;">Sede Principal
                                        </h6>
                                        <small class="text-secondary fw-semibold d-block"
                                            style="font-size: 0.65rem; letter-spacing: 0.5px; line-height: 1.2;">SUCURSAL
                                            MATRIZ</small>
                                    </div>
                                </div>
                                <div class="form-check form-switch ms-2">
                                    <input class="form-check-input fs-3 m-0 shadow-none" type="checkbox" role="switch"
                                        id="isMainSwitch" formControlName="IsMain" style="cursor: pointer;">
                                </div>
                            </div>
                        </div>

                        <!-- Estado Toggle (Right - Segmented Style) -->
                        <div class="col-12 col-md-6 d-flex flex-column justify-content-center">

                            <!-- Label Updated Here -->
                            <label class="form-label small fw-bold mb-2 text-center w-100 text-uppercase text-secondary"
                                style="font-size: 0.75rem; letter-spacing: 0.5px;">Estado de la Sede</label>

                            <div class="d-flex align-items-center bg-white border rounded-pill p-1 shadow-sm"
                                style="min-height: 50px;">

                                <!-- Activa -->
                                <div class="flex-fill text-center py-2 rounded-pill fw-bold cursor-pointer position-relative d-flex align-items-center justify-content-center"
                                    [class.bg-success]="form.get('IdStateHeadquarter')?.value === 1"
                                    [class.text-white]="form.get('IdStateHeadquarter')?.value === 1"
                                    [class.text-muted]="form.get('IdStateHeadquarter')?.value !== 1"
                                    (click)="setEstado(1)" role="button"
                                    style="height: 100%; transition: all 0.3s ease;">
                                    <i class="bi bi-check-circle-fill me-2"
                                        *ngIf="form.get('IdStateHeadquarter')?.value === 1"></i>
                                    Activa
                                </div>

                                <!-- Inactiva -->
                                <div class="flex-fill text-center py-2 rounded-pill fw-bold cursor-pointer position-relative d-flex align-items-center justify-content-center"
                                    [class.bg-danger]="form.get('IdStateHeadquarter')?.value === 2"
                                    [class.text-white]="form.get('IdStateHeadquarter')?.value === 2"
                                    [class.text-muted]="form.get('IdStateHeadquarter')?.value !== 2"
                                    (click)="setEstado(2)" role="button"
                                    style="height: 100%; transition: all 0.3s ease;">
                                    <i class="bi bi-x-circle-fill me-2"
                                        *ngIf="form.get('IdStateHeadquarter')?.value === 2"></i>
                                    Inactiva
                                </div>

                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- FOOTER -->
            <div class="modal-footer flex-column border-top p-4 gap-2" *ngIf="!isSuccess">
                <button class="btn btn-success w-100 fw-bold py-3 shadow-lg rounded-3" (click)="onSubmit()"
                    [disabled]="form.invalid || isLoading">
                    <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status"
                        aria-hidden="true"></span>
                    <span *ngIf="!isLoading">Confirmar y Guardar</span>
                </button>
                <button class="btn btn-link text-danger w-100 text-decoration-none fw-semibold py-2"
                    (click)="onClose()">
                    Cancelar
                </button>
            </div>

        </div>
    </div>
</div>

<!-- Extra layer for backdrop blur -->
<div class="modal-backdrop fade show" *ngIf="isOpen"
    style="background-color: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 1040;"></div>
