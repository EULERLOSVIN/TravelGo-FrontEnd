<div class="modal d-block bg-dark bg-opacity-50" *ngIf="isOpen" (click)="close.emit()" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered" (click)="$event.stopPropagation()">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Nueva Ruta</h5>
                <button type="button" class="btn-close" (click)="close.emit()"></button>
            </div>
            <div class="modal-body py-4">
                <form class="row g-3" #routeForm="ngForm">
                    <!-- Origen y Destino en la misma fila -->
                    <div class="col-12 col-md-6">
                        <label class="form-label small fw-bold text-muted text-uppercase mb-1"
                            style="font-size: 0.7rem; letter-spacing: 0.5px;">Origen</label>
                        <select class="form-select border-0 bg-light rounded-3 shadow-sm py-2"
                            [(ngModel)]="formData.idPlaceA" name="idPlaceA" required #origin="ngModel">
                            <option [ngValue]="null" disabled selected>Seleccione...</option>
                            <option *ngFor="let p of places" [value]="p.idPlace"
                                [disabled]="p.idPlace == formData.idPlaceB">
                                {{p.name}}
                            </option>
                        </select>
                        <div *ngIf="origin.invalid && (origin.dirty || origin.touched)" class="text-danger small mt-1">
                            Requerido.
                        </div>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label small fw-bold text-muted text-uppercase mb-1"
                            style="font-size: 0.7rem; letter-spacing: 0.5px;">Destino</label>
                        <select class="form-select border-0 bg-light rounded-3 shadow-sm py-2"
                            [(ngModel)]="formData.idPlaceB" name="idPlaceB" required #destination="ngModel">
                            <option [ngValue]="null" disabled selected>Seleccione...</option>
                            <option *ngFor="let p of places" [value]="p.idPlace"
                                [disabled]="p.idPlace == formData.idPlaceA">
                                {{p.name}}
                            </option>
                        </select>
                        <div *ngIf="destination.invalid && (destination.dirty || destination.touched)"
                            class="text-danger small mt-1">
                            Requerido.
                        </div>
                    </div>

                    <!-- Horarios (Departure Times) -->
                    <div class="col-12 mt-4 mb-2">
                        <label class="form-label small fw-bold text-muted text-uppercase mb-1"
                            style="font-size: 0.7rem; letter-spacing: 0.5px;">Horarios de Salida Programados</label>
                        <div class="d-flex gap-2 mb-2">
                            <input type="time" class="form-control border-0 bg-light rounded-3 shadow-sm py-2"
                                style="max-width: 150px;" [(ngModel)]="newTime" name="newTime">
                            <button type="button" class="btn btn-primary rounded-3 px-3 shadow-sm" (click)="addTime()"
                                [disabled]="!newTime">
                                <i class="bi bi-plus-lg me-1"></i> Añadir Turno
                            </button>
                        </div>

                        <!-- Lista de chips de horarios -->
                        <div class="d-flex flex-wrap gap-2 mt-2">
                            <div *ngFor="let time of departureTimes; let i = index"
                                class="badge bg-white text-dark border shadow-sm px-3 py-2 rounded-pill d-flex align-items-center">
                                <i class="bi bi-clock text-primary me-2"></i>
                                <span class="fw-bold">{{ time }}</span>
                                <button type="button" class="btn p-0 ms-2 text-danger hover-opacity"
                                    (click)="removeTime(i)">
                                    <i class="bi bi-x-circle-fill fs-6"></i>
                                </button>
                            </div>
                            <div *ngIf="departureTimes.length === 0" class="text-muted small fst-italic">
                                No se ha programado ningún horario fijo.
                            </div>
                        </div>
                    </div>

                    <!-- Precio y Estado -->
                    <div class="col-12 col-md-6">
                        <label class="form-label small fw-bold text-muted text-uppercase mb-1"
                            style="font-size: 0.7rem; letter-spacing: 0.5px;">Precio (S/)</label>
                        <div class="input-group shadow-sm rounded-3 overflow-hidden border-0">
                            <span class="input-group-text bg-white border-0 text-muted ps-3">S/</span>
                            <input type="number" class="form-control border-0 bg-white" [(ngModel)]="formData.price"
                                name="price" required min="1" placeholder="0.00">
                        </div>
                    </div>

                    <div class="col-12 col-md-6 d-flex align-items-end">
                        <div class="form-check form-switch bg-light rounded-3 p-2 ps-5 border border-0 w-100 d-flex align-items-center"
                            style="height: 42px;"> <!-- Altura para igualar al input -->
                            <input class="form-check-input ms-0 me-2" type="checkbox" role="switch" id="statusSwitchNew"
                                [(ngModel)]="formData.isActive" name="isActive">
                            <label class="form-check-label fw-bold small mb-0" for="statusSwitchNew"
                                [ngClass]="formData.isActive ? 'text-success' : 'text-secondary'">
                                {{ formData.isActive ? 'ACTIVO' : 'INACTIVO' }}
                            </label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-sm btn-light rounded-pill px-3" (click)="close.emit()"
                    [disabled]="isLoading">Cancelar</button>
                <button type="button" class="btn btn-sm btn-success rounded-pill px-3" (click)="save()"
                    [disabled]="isLoading || !formData.idPlaceA || !formData.idPlaceB || !formData.price || formData.price <= 0">
                    {{ isLoading ? 'Guardando...' : 'Guardar' }}
                </button>
            </div>
        </div>
    </div>
</div>
