<div class="modal d-block bg-dark bg-opacity-50" *ngIf="isOpen" (click)="close.emit()" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered" (click)="$event.stopPropagation()">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Nueva Ruta</h5>
                <button type="button" class="btn-close" (click)="close.emit()"></button>
            </div>
            <div class="modal-body py-3">
                <form class="row g-2" #routeForm="ngForm">
                    <div class="col-12">
                        <label class="form-label small fw-semibold mb-1">Origen <span
                                class="text-danger">*</span></label>
                        <select class="form-select form-select-sm rounded-pill" [(ngModel)]="formData.idPlaceA"
                            name="idPlaceA" required #origin="ngModel">
                            <option [ngValue]="null" disabled selected>Seleccione...</option>
                            <option *ngFor="let p of places" [value]="p.idPlace"
                                [disabled]="p.idPlace == formData.idPlaceB">
                                {{p.name}} {{ p.idPlace == formData.idPlaceB ? '(Destino)' : '' }}
                            </option>
                        </select>
                        <div *ngIf="origin.invalid && (origin.dirty || origin.touched)" class="text-danger small mt-1"
                            style="font-size: 0.75rem;">
                            Seleccione el origen.
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-semibold mb-1">Destino <span
                                class="text-danger">*</span></label>
                        <select class="form-select form-select-sm rounded-pill" [(ngModel)]="formData.idPlaceB"
                            name="idPlaceB" required #destination="ngModel">
                            <option [ngValue]="null" disabled selected>Seleccione...</option>
                            <option *ngFor="let p of places" [value]="p.idPlace"
                                [disabled]="p.idPlace == formData.idPlaceA">
                                {{p.name}} {{ p.idPlace == formData.idPlaceA ? '(Origen)' : '' }}
                            </option>
                        </select>
                        <div *ngIf="destination.invalid && (destination.dirty || destination.touched)"
                            class="text-danger small mt-1" style="font-size: 0.75rem;">
                            Seleccione el destino.
                        </div>
                    </div>
                   
                    <div class="col-12">
                        <label class="form-label small fw-semibold mb-1">Precio (S/) <span
                                class="text-danger">*</span></label>
                        <input type="number" class="form-control form-control-sm rounded-pill"
                            [(ngModel)]="formData.price" name="price" required min="1" #price="ngModel"
                            placeholder="0.00">
                        <div *ngIf="price.invalid && (price.dirty || price.touched)" class="text-danger small mt-1"
                            style="font-size: 0.75rem;">
                            Ingrese un precio válido.
                        </div>
                    </div>
                    <div class="col-12 mt-3">
                        <div
                            class="form-check form-switch bg-light rounded-4 p-2 ps-5 border d-flex align-items-center">
                            <input class="form-check-input ms-0 me-2" type="checkbox" role="switch" id="statusSwitchNew"
                                [(ngModel)]="formData.isActive" name="isActive">
                            <label class="form-check-label fw-bold small mb-0" for="statusSwitchNew"
                                [ngClass]="formData.isActive ? 'text-success' : 'text-secondary'">
                                {{ formData.isActive ? 'ACTIVO' : 'INACTIVO' }}
                            </label>
                            <small class="text-muted ms-auto pe-2" style="font-size: 0.75rem;">
                                {{ formData.isActive ? 'Ruta operativa' : 'Ruta suspendida' }}
                            </small>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-sm btn-light rounded-pill px-3" (click)="close.emit()"
                    [disabled]="isLoading">Cancelar</button>
                <button type="button" class="btn btn-sm btn-success rounded-pill px-3" (click)="save()"
                    [disabled]="isLoading || !formData.idPlaceA || !formData.idPlaceB || !formData.price || formData.price <= 0">
                    {{ isLoading ? 'Guardando...' : 'Guardar' }}
                </button>
            </div>
        </div>
    </div>
</div>
