<div class="modal d-block bg-dark bg-opacity-50" *ngIf="isOpen" (click)="close.emit()" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered" (click)="$event.stopPropagation()">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Editar Lugar</h5>
                <button type="button" class="btn-close" (click)="close.emit()"></button>
            </div>
            <div class="modal-body py-3">
                <form>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold mb-1">Nombre</label>
                        <input type="text" class="form-control form-control-sm rounded-pill" [(ngModel)]="place.nombre"
                            name="nombre" placeholder="Nombre del lugar">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold mb-1">Descripción</label>
                        <textarea class="form-control form-control-sm rounded-3" [(ngModel)]="place.descripcion"
                            name="descripcion" rows="3" placeholder="Descripción del lugar"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-sm btn-light rounded-pill px-3"
                    (click)="close.emit()">Cancelar</button>
                <button type="button" class="btn btn-sm btn-primary rounded-pill px-3" (click)="save()">Guardar
                    Cambios</button>
            </div>
        </div>
    </div>
</div>
