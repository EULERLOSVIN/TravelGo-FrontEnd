<div class="modal d-block bg-dark bg-opacity-50" *ngIf="isOpen" (click)="close.emit()" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered" (click)="$event.stopPropagation()">
        <div class="modal-content border-0 shadow">
            <div class="modal-header border-0 pb-0">
                <h5 class="modal-title fw-bold">Editar Ruta</h5>
                <button type="button" class="btn-close" (click)="close.emit()"></button>
            </div>
            <div class="modal-body py-3">
                <form class="row g-3" *ngIf="routeToEdit">
                    <!-- Origen y Destino -->
                    <div class="col-12 col-md-6">
                        <label class="form-label small fw-bold text-muted text-uppercase mb-1"
                            style="font-size: 0.7rem; letter-spacing: 0.5px;">Origen</label>
                        <select class="form-select border-0 bg-light rounded-3 shadow-sm py-2"
                            [(ngModel)]="routeToEdit.idPlaceA" name="idPlaceA">
                            <option *ngFor="let p of places" [ngValue]="p.idPlace"
                                [disabled]="p.idPlace == routeToEdit.idPlaceB">
                                {{p.name}}
                            </option>
                        </select>
                    </div>

                    <div class="col-12 col-md-6">
                        <label class="form-label small fw-bold text-muted text-uppercase mb-1"
                            style="font-size: 0.7rem; letter-spacing: 0.5px;">Destino</label>
                        <select class="form-select border-0 bg-light rounded-3 shadow-sm py-2"
                            [(ngModel)]="routeToEdit.idPlaceB" name="idPlaceB">
                            <option *ngFor="let p of places" [ngValue]="p.idPlace"
                                [disabled]="p.idPlace == routeToEdit.idPlaceA">
                                {{p.name}}
                            </option>
                        </select>
                    </div>

                    <!-- Precio y Estado -->
                    <div class="col-12 col-md-6">
                        <label class="form-label small fw-bold text-muted text-uppercase mb-1"
                            style="font-size: 0.7rem; letter-spacing: 0.5px;">Precio (S/)</label>
                        <div class="input-group shadow-sm rounded-3 overflow-hidden border-0">
                            <span class="input-group-text bg-white border-0 text-muted ps-3">S/</span>
                            <input type="number" class="form-control border-0 bg-white" [(ngModel)]="routeToEdit.price"
                                name="price" required min="1" placeholder="0.00">
                        </div>
                    </div>

                    <div class="col-12 col-md-6 d-flex align-items-end">
                        <div class="form-check form-switch bg-light rounded-3 p-2 ps-5 border border-0 w-100 d-flex align-items-center"
                            style="height: 42px;">
                            <input class="form-check-input ms-0 me-2" type="checkbox" role="switch"
                                id="statusSwitchEdit" [(ngModel)]="routeToEdit.isActive" name="isActive">
                            <label class="form-check-label fw-bold small mb-0" for="statusSwitchEdit"
                                [ngClass]="routeToEdit.isActive ? 'text-success' : 'text-secondary'">
                                {{ routeToEdit.isActive ? 'ACTIVO' : 'INACTIVO' }}
                            </label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-sm btn-light rounded-pill px-3"
                    (click)="close.emit()">Cancelar</button>
                <button type="button" class="btn btn-sm btn-success rounded-pill px-3" (click)="save()"
                    [disabled]="isLoading || !hasChanges()">Actualizar</button>
            </div>
        </div>
    </div>
</div>
