<!-- 
  ==================================================
  MODAL OVERLAY
  ==================================================
-->
<div class="modal-overlay" *ngIf="isOpen" (click)="closeModal()">

    <!-- MODAL CONTAINER -->
    <div class="modal-container" (click)="$event.stopPropagation()">

        <!-- HEADER -->
        <header class="modal-header">
            <div class="title-group">
                <h2>Editar Ruta</h2>
                <span class="subtitle">MODIFICAR INFORMACIÓN DE VIAJE</span>
            </div>
            <button class="btn-close" (click)="closeModal()">
                <i class="bi bi-x-lg"></i>
            </button>
        </header>

        <!-- FORMULARIO -->
        <form class="modal-form" (ngSubmit)="updateRoute()">

            <!-- Fila 1 -->
            <div class="form-row">
                <div class="form-group">
                    <label>ORIGEN</label>
                    <div class="input-wrapper">
                        <select [(ngModel)]="formData.origin" name="origin">
                            <option disabled="" value="">Seleccione ciudad</option>
                            <option value="Huánuco">Huánuco</option>
                            <option value="Tingo María">Tingo María</option>
                            <option value="Pucallpa">Pucallpa</option>
                            <option value="Aucayacu">Aucayacu</option>
                            <option value="Lima">Lima</option>
                            <option value="Cerro de Pasco">Cerro de Pasco</option>
                        </select>
                        <i class="bi bi-geo-alt input-icon"></i>
                        <i class="bi bi-chevron-down select-arrow"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>DESTINO</label>
                    <div class="input-wrapper">
                        <select [(ngModel)]="formData.destination" name="destination">
                            <option disabled="" value="">Seleccione ciudad</option>
                            <option value="Huánuco">Huánuco</option>
                            <option value="Tingo María">Tingo María</option>
                            <option value="Pucallpa">Pucallpa</option>
                            <option value="Aucayacu">Aucayacu</option>
                            <option value="Lima">Lima</option>
                            <option value="Cerro de Pasco">Cerro de Pasco</option>
                        </select>
                        <i class="bi bi-geo input-icon"></i>
                        <i class="bi bi-chevron-down select-arrow"></i>
                    </div>
                </div>
            </div>

            <!-- Fila 2 -->
            <div class="form-row">
                <div class="form-group">
                    <label>TIEMPO (Hrs)</label>
                    <div class="input-wrapper">
                        <input type="number" [(ngModel)]="formData.time" name="time" step="0.5">
                        <i class="bi bi-clock input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>PRECIO (S/.)</label>
                    <div class="input-wrapper">
                        <input type="number" [(ngModel)]="formData.price" name="price">
                        <i class="bi bi-currency-dollar input-icon"></i>
                    </div>
                </div>
            </div>

            <!-- Estado -->
            <div class="form-group">
                <label>ESTADO OPERATIVO</label>
                <div class="status-selector">
                    <label class="status-option" [class.active]="formData.status === 'active'">
                        <input type="radio" [(ngModel)]="formData.status" name="status" value="active">
                        <i class="bi bi-check-circle-fill"></i>
                        <span>Activa</span>
                    </label>

                    <label class="status-option" [class.active]="formData.status === 'inactive'">
                        <input type="radio" [(ngModel)]="formData.status" name="status" value="inactive">
                        <i class="bi bi-x-circle-fill"></i>
                        <span>Inactiva</span>
                    </label>
                </div>
            </div>

            <!-- Actions -->
            <div class="form-actions">
                <button type="button" class="btn-cancel" (click)="closeModal()">Descartar</button>
                <button type="submit" class="btn-save">
                    <i class="bi bi-check2-circle"></i>
                    Actualizar Cambios
                </button>
            </div>

        </form>

        <div class="modal-footer-brand">
            <span class="brand-red">SEIS</span>
            <span class="brand-green">ESPECIAL</span>
        </div>

    </div>
</div>
