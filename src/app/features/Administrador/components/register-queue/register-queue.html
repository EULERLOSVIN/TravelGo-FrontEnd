<div class="modal fade" id="addDriverModal" tabindex="-1" aria-labelledby="addDriverModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
            <div class="modal-header bg-success text-white border-0 py-3">
                <h5 class="modal-title fw-bold d-flex align-items-center gap-2" id="addDriverModalLabel">
                    <i class="bi bi-person-plus-fill"></i> Añadir a Cola
                </h5>
                <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="modal"
                    aria-label="Close"></button>
            </div>
            <div class="modal-body p-4 bg-light">
                <p class="text-secondary small mb-4">Busque un chofer disponible en esta sede y asígnalo a una de
                    las rutas activas.</p>

                <div class="mb-3">
                    <label class="form-label fw-semibold text-dark small">DNI del Chofer</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white text-muted"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control shadow-none" placeholder="Buscar por DNI o Nombre..."
                            [(ngModel)]="driverDni">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold text-dark small">Ruta de Destino</label>
                    <select class="form-select shadow-none" [(ngModel)]="routeId"
                        (ngModelChange)="onRouteSelectChange()">
                        <option *ngFor="let route of routes" [ngValue]="route.idRoute">
                            Hacia: {{ route.destinationName.replace('Hacia ', '') }}
                        </option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold text-dark small">Horario de Salida Programado</label>
                    <select class="form-select shadow-none" [(ngModel)]="departureTimeId">
                        <option [ngValue]="null">-- Sin horario fijo / Partida Libre --</option>
                        <option *ngFor="let time of departureTimes" [ngValue]="time.idDepartureTime">
                            {{ time.hour }}
                        </option>
                    </select>
                    <small *ngIf="routeId && departureTimes.length === 0" class="text-muted d-block mt-1">
                        <i class="bi bi-info-circle"></i> Esta ruta no tiene horarios fijos programados.
                    </small>
                </div>

            </div>
            <div class="modal-footer border-0 p-3 pt-0 bg-light d-flex gap-2">
                <button type="button" class="btn btn-light border fw-semibold flex-grow-1"
                    data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success fw-bold flex-grow-1 shadow-sm" (click)="submit()"
                    data-bs-dismiss="modal">
                    <i class="bi bi-check2-circle me-1"></i> Confirmar Ingreso
                </button>
            </div>
        </div>
    </div>
</div>
