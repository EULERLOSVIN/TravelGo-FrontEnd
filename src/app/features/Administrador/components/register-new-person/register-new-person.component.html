<div class="modal fade" id="registerNewPersonModal" tabindex="-1" aria-labelledby="registerNewPersonModal"
    aria-hidden="true">

    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <div class="d-flex flex-column">
                    <h5 class="mb-0 text-danger fw-semibold">Travel<span class="text-success">Go</span></h5>
                    <h5 class="modal-title mb-0" id="registerNewPersonModal">
                        <strong class="fs-2">Registrar Nuevo Personal</strong>
                    </h5>
                </div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form>
                    <!-- datos personales -->
                    <div class="row g-2 mb-3">
                        <div class="col-12">
                            <h3 class="section-title-custom"><i class="bi bi-person icon-form"></i> Datos Personales</h3>
                        </div>

                        <div class="col-6">
                            <label class="form-label fw-semibold">Nombres:</label>
                            <input type="text" name="fullName" class="form-control rounded-pill" placeholder="Ej. Ana Lucía">
                        </div>

                        <div class="col-6">

                            <label class="form-label fw-semibold">Apellidos:</label>
                            <input type="text" name="fullName" class="form-control rounded-pill" placeholder="Ej. Ana Lucía">

                        </div>
                        <div class="col-6">

                            <label class="form-label fw-semibold">Tipo de Documento:</label>
                            <select name="" id="" class="form-select rounded-pill" aria-label="Default select example">
                                <option value="" disabled selected>Tipo de Documento</option>
                                <option value="dni">DNI</option>
                                <option value="passport">Pasaporte</option>
                                <option value="other">Otro</option>
                            </select>

                        </div>
                        <div class="col-6">

                            <label class="form-label fw-semibold">Número de Documento:</label>
                            <input class="form-control rounded-pill" type="text" name="dni" placeholder="Número">

                        </div>

                        <div class="col-6">

                            <label class="form-label fw-semibold">Celular:</label>
                            <input class="form-control rounded-pill" type="tel" name="phone" placeholder="987 654 321"
                                autocomplete="tel">

                        </div>
                    </div>
                    <!--definicion de roles -->
                    <div class="row g-2">
                        <div class="col-12">
                            <h3 class="section-title-custom"><i class="bi bi-person-lock icon-form"></i> Acceso al Sistema</h3>
                        </div>

                        <div class="col-6">
                            <label class="form-label fw-semibold">Cargo:</label>
                            <Select class="form-select rounded-pill" name="role" aria-label="Default select example">
                                <option value="" disabled selected>Selecciona un rol</option>
                                <option value="admin">Administrador</option>
                                <option value="teacher">Secretario</option>
                                <option value="student">Chofer</option>
                            </Select>
                        </div>

                        <div class="col-6">
                            <div class="mb-3">
                                <label class="form-label fw-semibold">Contraseña:</label>
                                <input class="form-control rounded-pill" type="password" autocomplete="new-password" name="password"
                                    placeholder="contraseña">
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary rounded-pill" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-success rounded-pill">Guardar</button>
            </div>
        </div>
    </div>

</div>
