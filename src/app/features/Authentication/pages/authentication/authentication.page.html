<div class="auth-wrapper">
  <div class="auth-container">
    <div class="auth-header">
      <h1 class="auth-title">HOLA <span class="highlight">DE NUEVO</span></h1>
      <p class="auth-subtitle">Ingresa a tu cuenta para gestionar tus viajes</p>
    </div>

    <form class="auth-form" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label class="form-label-custom">Correo Electrónico</label>
        <div class="input-group-custom">
          <i class="bi bi-envelope"></i>
          <input type="email" class="form-control" name="email" [(ngModel)]="loginData.email" placeholder="ejemplo@correo.com" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label-custom">Contraseña</label>
        <div class="input-group-custom">
          <i class="bi bi-lock"></i>
          <input type="password" class="form-control" name="password" [(ngModel)]="loginData.password" placeholder="••••••••" required>
        </div>
      </div>

      <div class="auth-actions">
        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
      </div>

      <button type="submit" class="btn-login-action">
        INICIAR SESIÓN
      </button>

      <div class="auth-footer">
        <span>¿No tienes una cuenta?</span>
        <a href="#" class="highlight link-register">Comunicate con el Administrador</a>
      </div>
    </form>
  </div>
</div>
