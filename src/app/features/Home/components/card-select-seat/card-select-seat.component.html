<div class="card border-0 shadow-sm rounded-4 p-4">

  <!-- Título -->
  <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
    <div>
      <h2 class="fw-bold mb-1">Selección de Asientos</h2>
      <p class="text-muted mb-0">Toyota Hiace - Servicio Premium</p>
    </div>

    <!-- Leyenda -->
    <div class="d-flex gap-3 flex-wrap align-items-center">
      <div class="d-flex align-items-center gap-2">
        <span class="tg-dot tg-dot-available"></span>
        <small class="text-muted">Disponible</small>
      </div>

      <div class="d-flex align-items-center gap-2">
        <span class="tg-dot tg-dot-occupied"></span>
        <small class="text-muted">Ocupado</small>
      </div>

      <div class="d-flex align-items-center gap-2">
        <span class="tg-dot tg-dot-selected"></span>
        <small class="text-muted">Seleccionado</small>
      </div>
    </div>
  </div>

  <!-- Área de asientos -->
  <div class="tg-seat-map rounded-4 p-4">

    <!-- Cabina -->
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div class="d-flex align-items-center gap-3">
        <div class="tg-icon-box">
          <i class="bi bi-steering-wheel fs-5"></i>
        </div>

        <div>
          <small class="text-uppercase text-muted fw-semibold d-block" style="font-size: 11px;">
            Frente
          </small>
          <span class="fw-bold">Cabina</span>
        </div>
      </div>

      <div class="tg-driver-box text-center">
        <small class="text-uppercase text-muted fw-semibold d-block" style="font-size: 10px;">
          Conductor
        </small>
        <i class="bi bi-person-circle fs-5"></i> 
      </div>
    </div>

    <hr class="my-3">

    <!-- 4 Botones de asientos (simple por ahora) -->
    <div class="row g-3 justify-content-center text-center">
      <div class="col-6 col-md-4">
        <button type="button" class="btn tg-seat-btn tg-seat-selected">1</button>
        <div class="tg-seat-text">PASAJERO</div>
      </div>

      <div class="col-6 col-md-4">
        <button type="button" class="btn tg-seat-btn tg-seat-occupied" disabled>2</button>
        <div class="tg-seat-text text-muted">OCUPADO</div>
      </div>

      <div class="col-6 col-md-4">
        <button type="button" class="btn tg-seat-btn tg-seat-available">3</button>
        <div class="tg-seat-text">PASAJERO</div>
      </div>

      <div class="col-6 col-md-4">
        <button type="button" class="btn tg-seat-btn tg-seat-available">4</button>
        <div class="tg-seat-text">PASAJERO</div>
      </div>
    </div>

    <div class="text-center mt-4">
      <small class="text-muted text-uppercase" style="letter-spacing: 2px; font-size: 11px;">
        Espacio de carga / Encomiendas
      </small>
    </div>
  </div>

  <!-- Beneficios -->
  <div class="row g-3 mt-4">
    <div class="col-12 col-md-4">
      <div class="tg-benefit d-flex align-items-center gap-2">
        <i class="bi bi-shield-check fs-5 tg-benefit-i"></i>
        <small class="fw-semibold">Seguro SOAT incluido</small>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="tg-benefit d-flex align-items-center gap-2">
        <i class="bi bi-snow2 fs-5 tg-benefit-i"></i>
        <small class="fw-semibold">Aire Acondicionado</small>
      </div>
    </div>

    <div class="col-12 col-md-4">
      <div class="tg-benefit d-flex align-items-center gap-2">
        <i class="bi bi-usb-plug fs-5 tg-benefit-i"></i>
        <small class="fw-semibold">Cargador USB</small>
      </div>
    </div>
  </div>

</div>
