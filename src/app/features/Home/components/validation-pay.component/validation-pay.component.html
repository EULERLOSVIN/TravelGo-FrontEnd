<!-- ===================================================== -->
<!-- MODAL VALIDACIÓN DE PAGO -->
<!-- ===================================================== -->
<div class="modal fade" id="validationModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4 border-0 p-4 text-center">

      <!-- Close -->
      <button type="button" class="btn-close ms-auto" data-bs-dismiss="modal">
      </button>

      <!-- Icon -->
      <div class="modal-body d-flex justify-content-center align-items-center">
        <div class="spinner-gradient" role="status">
          <span class="visually-hidden">Validando pago...</span>
        </div>
      </div>


      <!-- Text -->
      <h6 class="fw-bold mb-2">
        Estamos validando tu operación
      </h6>

      <p class="text-muted small mb-4">
        Nuestro equipo está verificando el número de operación ingresado.
        Esto tomará menos de un minuto.
      </p>

      <!-- Progress -->
      <div class="text-start small fw-semibold mb-1">
        VERIFICANDO... <span class="float-end">65%</span>
      </div>

      <div class="progress mb-3" style="height: 6px;">
        <div class="progress-bar bg-success" style="width: 65%">
        </div>
      </div>

      <!-- Footer note -->
      <div class="vp-note small text-muted">
        <i class="bi bi-lock-fill me-2 text-success"></i>
        Transacción segura y encriptada
      </div>

    </div>
  </div>
</div>
